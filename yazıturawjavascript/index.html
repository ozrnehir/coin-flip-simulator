<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Heads and Tails Game</title>
  </head>
  <body>
    <div class="container">
      <div class="stats">
        <p id="tura-count">Heads:0</p>
        <p id="yazi-count">Tails:0</p>
      </div>
      <div class="coin" id="coin">
        <div class="tura">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/c/cd/1TL_reverse.png"
            alt=""
          />
        </div>
        <div class="yazi">
          <img
            src="https://as1.ftcdn.net/jpg/00/37/03/56/1000_F_37035662_P969xIa10duuuR3nNPPZuWKp8f2Dq896.jpg"
            alt=""
          />
        </div>
      </div>
      <div class="buttons">
        <button id="flip-button">Flip</button>
        <button id="reset-button">Reset</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
